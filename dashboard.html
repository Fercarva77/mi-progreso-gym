<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carvajal Gym — Dashboard</title>
<style>
  :root {
    --bg:#f0f2f5; --card:#fff; --border:#e2e6ea;
    --text:#1a2332; --text-secondary:#5a6a7a; --text-muted:#9aa5b0;
    --accent:#1e7fa3; --accent2:#2ecc8a; --accent3:#e07040; --accent4:#7c5cdb;
    --danger:#e05a4c; --success:#2ecc8a; --radius:16px;
    --font:'Segoe UI',system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}
  .header{background:var(--text);color:white;padding:24px 40px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
  .header h1{font-size:24px;font-weight:800;letter-spacing:-0.5px;}
  .header h1 span{color:#2389a0;}
  .header p{font-size:13px;color:#8a96a3;margin-top:2px;}
  .upload-zone{background:#1e2d3d;border:2px dashed #2389a0;border-radius:10px;padding:12px 20px;cursor:pointer;text-align:center;font-size:13px;color:#8a96a3;transition:all 0.2s;min-width:200px;}
  .upload-zone:hover{border-color:#4cc4cd;color:#4cc4cd;}
  .upload-zone.loaded{border-color:var(--success);color:var(--success);}
  .container{max-width:1200px;margin:0 auto;padding:32px 24px;}
  .empty-state{text-align:center;padding:80px 20px;color:var(--text-muted);}
  .empty-state .icon{font-size:64px;margin-bottom:16px;}
  .empty-state h2{font-size:22px;color:var(--text-secondary);margin-bottom:8px;}
  .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
  .stat-card{background:var(--card);border-radius:var(--radius);padding:20px 24px;border:1px solid var(--border);}
  .stat-card .label{font-size:12px;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-muted);font-weight:600;margin-bottom:8px;}
  .stat-card .value{font-size:32px;font-weight:800;letter-spacing:-1px;}
  .stat-card .sub{font-size:12px;color:var(--text-muted);margin-top:4px;}
  .stat-card .delta{font-size:13px;font-weight:600;margin-top:4px;}
  .delta-up{color:var(--danger);} .delta-down{color:var(--success);}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;}
  .card{background:var(--card);border-radius:var(--radius);padding:24px;border:1px solid var(--border);}
  .card-title{font-size:15px;font-weight:700;margin-bottom:16px;}
  canvas{width:100%!important;}
  .table{width:100%;border-collapse:collapse;font-size:13px;}
  .table th{text-align:left;padding:8px 12px;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);border-bottom:1px solid var(--border);font-weight:600;}
  .table td{padding:10px 12px;border-bottom:1px solid var(--border);}
  .table tr:last-child td{border-bottom:none;}
  .table tr:hover td{background:var(--bg);}
  .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;}
  .badge-blue{background:#e3f2fd;color:var(--accent);}
  .badge-green{background:#e8f8f0;color:var(--success);}
  .progress-bar{height:8px;background:var(--bg);border-radius:4px;overflow:hidden;margin-top:6px;}
  .progress-fill{height:100%;border-radius:4px;}
  .section-title{font-size:18px;font-weight:800;margin:24px 0 16px;color:var(--text);display:flex;align-items:center;gap:10px;}
  .section-title::after{content:'';flex:1;height:1px;background:var(--border);}
  @media(max-width:900px){.stats-grid{grid-template-columns:repeat(2,1fr);}.grid-2{grid-template-columns:1fr;}.header{padding:16px 20px;}.container{padding:16px;}}
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>Carvajal <span>Gym</span></h1>
    <p id="headerSub">Dashboard — carga tu CSV exportado para comenzar</p>
  </div>
  <label class="upload-zone" id="uploadZone">
    📂 Cargar CSV exportado
    <input type="file" accept=".csv,.txt" id="csvInput" style="display:none;">
  </label>
</div>
<div class="container">
  <div id="emptyState" class="empty-state">
    <div class="icon">📊</div>
    <h2>Tu dashboard de progreso</h2>
    <p>Exporta desde la app Carvajal Gym en tu iPhone<br>y carga el archivo CSV aquí para ver tu análisis completo.</p>
  </div>
  <div id="dashboard" style="display:none;"></div>
</div>
<script>
let DATA = null;

document.getElementById('csvInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      DATA = parseCSV(ev.target.result);
      renderDashboard();
      document.getElementById('uploadZone').classList.add('loaded');
      document.getElementById('uploadZone').innerHTML = '✓ ' + file.name;
    } catch(err) {
      alert('Error al leer el archivo: ' + err.message);
      console.error(err);
    }
  };
  reader.readAsText(file, 'UTF-8');
});

function cleanCell(c) {
  return (c||'').replace(/^"|"$/g,'').trim();
}

function parseCSV(text) {
  const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
  const parsed = { pesos:[], agua:[], workouts:[], periodo:'' };
  let section = null;
  let currentWorkout = null;

  for(const line of lines) {
    const cells = line.split(',').map(cleanCell);
    const first = cells[0];

    // Detectar secciones
    if(first.includes('REPORTE')) continue;
    if(first.includes('Período:') || first.startsWith('Per')) {
      parsed.periodo = line.replace(/"/g,'').replace('Período:','').trim();
      continue;
    }
    if(first.includes('PESO CORPORAL')) { section='peso'; continue; }
    if(first.includes('HIDRATACIÓN') || first.includes('HIDRATACION')) { section='agua'; continue; }
    if(first.includes('ENTRENAMIENTOS')) { section='workout'; continue; }

    // Saltar encabezados de columna
    if(first === 'Fecha' || first === 'Ejercicio') continue;

    if(section === 'peso' && first.match(/^\d{4}-\d{2}-\d{2}$/)) {
      parsed.pesos.push({ date:first, lbs:parseFloat(cells[1])||0, kg:parseFloat(cells[2])||0 });
      continue;
    }

    if(section === 'agua' && first.match(/^\d{4}-\d{2}-\d{2}$/)) {
      parsed.agua.push({ date:first, litros:parseFloat(cells[1])||0 });
      continue;
    }

    if(section === 'workout') {
      // Nueva fecha = nuevo workout
      if(first.match(/^\d{4}-\d{2}-\d{2}$/)) {
        currentWorkout = { date:first, trote:null, entries:[] };
        parsed.workouts.push(currentWorkout);
        continue;
      }
      if(!currentWorkout) continue;

      // Línea de trote
      if(first === 'Trote') {
        currentWorkout.trote = {
          distancia: cells[1]||'', duracion: cells[2]||'', calorias: cells[3]||'', velocidad: cells[4]||''
        };
        continue;
      }

      // Ejercicio con series (tiene al menos una serie con datos)
      if(first && cells.length > 1 && cells[1] && cells[1] !== 'Serie 1') {
        const series = cells.slice(1).filter(s=>s && s!=='-' && s.includes('×'));
        currentWorkout.entries.push({ nombre:first, series });
        continue;
      }
    }
  }

  // Consolidar workouts del mismo día
  const porDia = {};
  for(const w of parsed.workouts) {
    if(!porDia[w.date]) porDia[w.date] = { date:w.date, trote:null, entries:[] };
    if(w.trote) porDia[w.date].trote = w.trote;
    porDia[w.date].entries.push(...w.entries);
  }
  parsed.workouts = Object.values(porDia).sort((a,b)=>a.date.localeCompare(b.date));

  return parsed;
}

function renderDashboard() {
  document.getElementById('emptyState').style.display = 'none';
  const dash = document.getElementById('dashboard');
  dash.style.display = 'block';
  const { pesos, agua, workouts, periodo } = DATA;
  document.getElementById('headerSub').textContent = `Período: ${periodo}`;

  const pesoInicio = pesos.length > 0 ? pesos[0].lbs : null;
  const pesoFin = pesos.length > 0 ? pesos[pesos.length-1].lbs : null;
  const deltaPeso = pesoInicio && pesoFin ? (pesoFin-pesoInicio).toFixed(1) : null;
  const avgAgua = agua.length > 0 ? (agua.reduce((a,b)=>a+b.litros,0)/agua.length).toFixed(1) : '—';
  const totalMi = workouts.reduce((a,w)=>a+(w.trote?parseFloat(w.trote.distancia)||0:0),0).toFixed(1);
  const diasEntrenados = workouts.filter(w=>w.entries.length>0).length;
  const ejerciciosResumen = getEjerciciosResumen();

  dash.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="label">Peso actual</div>
        <div class="value" style="color:var(--accent)">${pesoFin?pesoFin+' lb':'—'}</div>
        ${deltaPeso?`<div class="delta ${parseFloat(deltaPeso)<=0?'delta-down':'delta-up'}">${parseFloat(deltaPeso)>0?'↑':'↓'} ${Math.abs(deltaPeso)} lb</div>`:''}
        <div class="sub">${pesoFin?(pesoFin/2.20462).toFixed(1)+' kg':''}</div>
      </div>
      <div class="stat-card">
        <div class="label">Días entrenados</div>
        <div class="value" style="color:var(--accent2)">${diasEntrenados}</div>
        <div class="sub">${workouts.length} días en el período</div>
      </div>
      <div class="stat-card">
        <div class="label">Millas corridas</div>
        <div class="value" style="color:var(--accent3)">${totalMi}</div>
        <div class="sub">${(parseFloat(totalMi)*1.60934).toFixed(1)} km totales</div>
      </div>
      <div class="stat-card">
        <div class="label">Agua promedio</div>
        <div class="value" style="color:var(--accent4)">${avgAgua}L</div>
        <div class="sub">Meta: 2.5L diarios</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,parseFloat(avgAgua)/2.5*100)}%;background:var(--accent4);"></div></div>
      </div>
    </div>

    <div class="section-title">📈 Evolución</div>
    <div class="grid-2">
      <div class="card">
        <div class="card-title">⚖️ Peso corporal (lb)</div>
        <canvas id="pesoChart" height="200"></canvas>
      </div>
      <div class="card">
        <div class="card-title">💧 Agua diaria (L)</div>
        <canvas id="aguaChart" height="200"></canvas>
      </div>
    </div>

    <div class="section-title">💪 Ejercicios</div>
    <div class="grid-2">
      <div class="card">
        <div class="card-title">📅 Sesiones</div>
        <table class="table">
          <thead><tr><th>Fecha</th><th>Ejercicios</th><th>Trote</th></tr></thead>
          <tbody>${workouts.map(w=>`<tr>
            <td><strong>${formatFecha(w.date)}</strong></td>
            <td>${w.entries.length>0?`<span class="badge badge-blue">${w.entries.length}</span>`:'—'}</td>
            <td>${w.trote?`<span class="badge badge-green">${w.trote.distancia}</span>`:'—'}</td>
          </tr>`).join('')}</tbody>
        </table>
      </div>
      <div class="card">
        <div class="card-title">🏋️ Progreso por ejercicio</div>
        <table class="table">
          <thead><tr><th>Ejercicio</th><th>Series</th><th>Mejor peso</th></tr></thead>
          <tbody>${ejerciciosResumen.slice(0,12).map(e=>`<tr>
            <td>${e.nombre}</td>
            <td><span class="badge badge-blue">${e.totalSeries}</span></td>
            <td><strong>${e.mejorPeso>0?e.mejorPeso+'lb':'—'}</strong></td>
          </tr>`).join('')}</tbody>
        </table>
      </div>
    </div>

    <div class="section-title">📋 Historial de peso</div>
    <div class="card">
      <table class="table">
        <thead><tr><th>Fecha</th><th>Libras</th><th>Kilos</th><th>Cambio</th></tr></thead>
        <tbody>${pesos.map((p,i)=>{
          const prev=i>0?pesos[i-1].lbs:null;
          const d=prev?(p.lbs-prev).toFixed(1):null;
          return `<tr>
            <td>${formatFecha(p.date)}</td>
            <td><strong>${p.lbs} lb</strong></td>
            <td>${p.kg} kg</td>
            <td>${d?`<span class="${parseFloat(d)<=0?'delta-down':'delta-up'}">${parseFloat(d)>0?'+':''}${d} lb</span>`:'—'}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>
  `;

  setTimeout(()=>{
    drawLine('pesoChart', pesos.map(p=>({x:p.date,y:p.lbs})), 'lb', '#1e7fa3');
    drawBars('aguaChart', agua.map(a=>({x:a.date,y:a.litros})), 'L', '#7c5cdb', 2.5);
  }, 100);
}

function getEjerciciosResumen() {
  const map = {};
  DATA.workouts.forEach(w=>{
    w.entries.forEach(e=>{
      if(!map[e.nombre]) map[e.nombre]={nombre:e.nombre,totalSeries:0,mejorPeso:0};
      map[e.nombre].totalSeries += e.series.length;
      e.series.forEach(s=>{
        const m=s.match(/(\d+\.?\d*)lb/);
        if(m) map[e.nombre].mejorPeso=Math.max(map[e.nombre].mejorPeso,parseFloat(m[1]));
      });
    });
  });
  return Object.values(map).sort((a,b)=>b.totalSeries-a.totalSeries);
}

function formatFecha(d) {
  if(!d||!d.match(/\d{4}-\d{2}-\d{2}/)) return d||'';
  const dt=new Date(d+'T00:00:00');
  const m=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const ds=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  return `${ds[dt.getDay()]} ${dt.getDate()} ${m[dt.getMonth()]}`;
}

function drawLine(id, data, unit, color) {
  const canvas=document.getElementById(id);
  if(!canvas||data.length<2) return;
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const W=canvas.offsetWidth; const H=200;
  canvas.width=W*dpr; canvas.height=H*dpr; ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);
  const vals=data.map(d=>d.y);
  const minV=Math.min(...vals)-0.5, maxV=Math.max(...vals)+0.5, range=maxV-minV||1;
  const pL=50,pR=16,pT=16,pB=30,cW=W-pL-pR,cH=H-pT-pB;
  ctx.strokeStyle='#e2e6ea'; ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y=pT+(cH/4)*i;
    ctx.beginPath(); ctx.moveTo(pL,y); ctx.lineTo(W-pR,y); ctx.stroke();
    ctx.fillStyle='#9aa5b0'; ctx.font='11px sans-serif'; ctx.textAlign='right';
    ctx.fillText((maxV-(range/4)*i).toFixed(1)+unit,pL-4,y+4);
  }
  const grad=ctx.createLinearGradient(0,pT,0,pT+cH);
  grad.addColorStop(0,color+'33'); grad.addColorStop(1,color+'05');
  ctx.beginPath();
  data.forEach((d,i)=>{
    const x=pL+(cW/(data.length-1))*i,y=pT+cH-((d.y-minV)/range)*cH;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.lineTo(pL+(cW/(data.length-1))*(data.length-1),pT+cH);
  ctx.lineTo(pL,pT+cH); ctx.closePath();
  ctx.fillStyle=grad; ctx.fill();
  ctx.beginPath(); ctx.strokeStyle=color; ctx.lineWidth=2.5;
  data.forEach((d,i)=>{
    const x=pL+(cW/(data.length-1))*i,y=pT+cH-((d.y-minV)/range)*cH;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }); ctx.stroke();
  data.forEach((d,i)=>{
    const x=pL+(cW/(data.length-1))*i,y=pT+cH-((d.y-minV)/range)*cH;
    ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2);
    ctx.fillStyle='white'; ctx.fill();
    ctx.strokeStyle=color; ctx.lineWidth=2; ctx.stroke();
  });
  ctx.fillStyle='#9aa5b0'; ctx.font='11px sans-serif';
  ctx.textAlign='left'; ctx.fillText(formatFecha(data[0].x),pL,H-6);
  ctx.textAlign='right'; ctx.fillText(formatFecha(data[data.length-1].x),W-pR,H-6);
}

function drawBars(id, data, unit, color, meta) {
  const canvas=document.getElementById(id);
  if(!canvas||data.length===0) return;
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const W=canvas.offsetWidth; const H=200;
  canvas.width=W*dpr; canvas.height=H*dpr; ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);
  const maxV=Math.max(meta||0,...data.map(d=>d.y))*1.15||1;
  const pL=10,pR=10,pT=20,pB=24,cW=W-pL-pR,cH=H-pT-pB;
  const barW=Math.max(8,(cW/data.length)-6);
  if(meta>0){
    const my=pT+cH-((meta/maxV)*cH);
    ctx.strokeStyle=color+'66'; ctx.lineWidth=1; ctx.setLineDash([5,4]);
    ctx.beginPath(); ctx.moveTo(pL,my); ctx.lineTo(W-pR,my); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle=color; ctx.font='10px sans-serif'; ctx.textAlign='right';
    ctx.fillText(`Meta ${meta}${unit}`,W-pR-2,my-4);
  }
  data.forEach((d,i)=>{
    const x=pL+(cW/data.length)*i+(cW/data.length-barW)/2;
    const barH=(d.y/maxV)*cH; const y=pT+cH-barH;
    const pct=meta>0?d.y/meta:1;
    const c=meta>0?(pct>=1?'#2ecc8a':pct>=0.6?color:'#e05a4c'):color;
    ctx.fillStyle=c+'cc';
    ctx.beginPath();
    if(ctx.roundRect)ctx.roundRect(x,y,barW,barH,4);else ctx.rect(x,y,barW,barH);
    ctx.fill();
    if(d.y>0){
      ctx.fillStyle='#5a6a7a'; ctx.font='10px sans-serif'; ctx.textAlign='center';
      ctx.fillText(d.y%1===0?d.y:d.y.toFixed(1),x+barW/2,y-4);
    }
  });
  ctx.fillStyle='#9aa5b0'; ctx.font='10px sans-serif';
  ctx.textAlign='left'; ctx.fillText(formatFecha(data[0].x),pL,H-4);
  ctx.textAlign='right'; ctx.fillText(formatFecha(data[data.length-1].x),W-pR,H-4);
}
</script>
</body>
</html>
