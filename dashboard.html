<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carvajal Gym — Dashboard</title>
<style>
  :root {
    --bg: #f0f2f5;
    --card: #ffffff;
    --border: #e2e6ea;
    --text: #1a2332;
    --text-secondary: #5a6a7a;
    --text-muted: #9aa5b0;
    --accent: #1e7fa3;
    --accent2: #2ecc8a;
    --accent3: #e07040;
    --accent4: #7c5cdb;
    --danger: #e05a4c;
    --success: #2ecc8a;
    --radius: 16px;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

  .header {
    background: var(--text);
    color: white;
    padding: 24px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
  .header h1 span { color: #2389a0; }
  .header p { font-size: 13px; color: #8a96a3; margin-top: 2px; }
  .upload-zone {
    background: #1e2d3d;
    border: 2px dashed #2389a0;
    border-radius: 10px;
    padding: 12px 20px;
    cursor: pointer;
    text-align: center;
    font-size: 13px;
    color: #8a96a3;
    transition: all 0.2s;
    min-width: 200px;
  }
  .upload-zone:hover { border-color: #4cc4cd; color: #4cc4cd; }
  .upload-zone.loaded { border-color: var(--success); color: var(--success); }

  .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 64px; margin-bottom: 16px; }
  .empty-state h2 { font-size: 22px; color: var(--text-secondary); margin-bottom: 8px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .stat-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px 24px;
    border: 1px solid var(--border);
  }
  .stat-card .label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); font-weight: 600; margin-bottom: 8px; }
  .stat-card .value { font-size: 32px; font-weight: 800; letter-spacing: -1px; }
  .stat-card .sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .stat-card .delta { font-size: 13px; font-weight: 600; margin-top: 4px; }
  .delta-up { color: var(--danger); }
  .delta-down { color: var(--success); }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .full { grid-column: 1 / -1; }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 24px;
    border: 1px solid var(--border);
  }
  .card-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title .icon { font-size: 18px; }

  canvas { width: 100% !important; }

  .table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .table th { text-align: left; padding: 8px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); border-bottom: 1px solid var(--border); font-weight: 600; }
  .table td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .table tr:last-child td { border-bottom: none; }
  .table tr:hover td { background: var(--bg); }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-blue { background: #e3f2fd; color: var(--accent); }
  .badge-green { background: #e8f8f0; color: var(--success); }
  .badge-red { background: #fdecea; color: var(--danger); }

  .progress-bar { height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; margin-top: 6px; }
  .progress-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }

  .week-row { display: grid; grid-template-columns: 80px repeat(7, 1fr); gap: 8px; margin-bottom: 8px; align-items: center; }
  .week-row .label { font-size: 11px; color: var(--text-muted); font-weight: 600; }
  .week-cell { height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; }
  .week-cell.empty { background: var(--bg); color: var(--text-muted); }
  .week-cell.has-data { background: #e3f6ff; color: var(--accent); }
  .week-cell.high { background: #d4f5e9; color: var(--success); }

  .section-title { font-size: 18px; font-weight: 800; margin-bottom: 16px; color: var(--text); display: flex; align-items: center; gap: 10px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  @media (max-width: 900px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    .header { padding: 16px 20px; flex-direction: column; gap: 12px; align-items: flex-start; }
    .container { padding: 16px; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Carvajal <span>Gym</span></h1>
    <p id="headerSub">Dashboard de progreso — carga tu archivo CSV para comenzar</p>
  </div>
  <label class="upload-zone" id="uploadZone">
    📂 Cargar CSV exportado
    <input type="file" accept=".csv" id="csvInput" style="display:none;">
  </label>
</div>

<div class="container">
  <div id="emptyState" class="empty-state">
    <div class="icon">📊</div>
    <h2>Tu dashboard de progreso</h2>
    <p>Exporta tu semana desde la app Carvajal Gym en tu iPhone<br>y carga el archivo CSV aquí para ver tu análisis completo.</p>
  </div>
  <div id="dashboard" style="display:none;"></div>
</div>

<script>
let DATA = null;

document.getElementById('csvInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    DATA = parseCSV(ev.target.result);
    renderDashboard();
    document.getElementById('uploadZone').classList.add('loaded');
    document.getElementById('uploadZone').innerHTML = '✓ ' + file.name;
  };
  reader.readAsText(ev.target.files[0], 'UTF-8');
});

// ===== PARSE CSV =====
function parseCSV(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const parsed = { pesos:[], agua:[], workouts:[], periodo:'' };

  let section = null;
  let periodoLine = '';

  lines.forEach(line => {
    const cells = line.split(',').map(c => c.replace(/^"|"$/g, '').trim());
    const first = cells[0];

    if(first.includes('REPORTE')) { periodoLine = first; return; }
    if(first.includes('Período:')) { parsed.periodo = cells.slice(1).join(' ').trim() || first; return; }
    if(first.includes('PESO CORPORAL')) { section = 'peso'; return; }
    if(first.includes('HIDRATACIÓN')) { section = 'agua'; return; }
    if(first.includes('ENTRENAMIENTOS')) { section = 'workout'; return; }
    if(first === 'Fecha' || first === 'Ejercicio') return;

    if(section === 'peso' && first.match(/\d{4}-\d{2}-\d{2}/)) {
      parsed.pesos.push({ date: cells[0], lbs: parseFloat(cells[1])||0, kg: parseFloat(cells[2])||0 });
    }
    if(section === 'agua' && first.match(/\d{4}-\d{2}-\d{2}/)) {
      parsed.agua.push({ date: cells[0], litros: parseFloat(cells[1])||0 });
    }
    if(section === 'workout') {
      if(first.match(/\d{4}-\d{2}-\d{2}/)) {
        parsed.workouts.push({ date: cells[0], entries: [] });
      } else if(first === 'Trote' && parsed.workouts.length) {
        const w = parsed.workouts[parsed.workouts.length-1];
        w.trote = { distancia: cells[1], duracion: cells[2], calorias: cells[3] };
      } else if(first && !first.includes('Serie') && parsed.workouts.length && first !== 'Trote') {
        const w = parsed.workouts[parsed.workouts.length-1];
        if(cells.length > 1 && cells[1]) {
          w.entries.push({ nombre: first, series: cells.slice(1).filter(Boolean) });
        }
      }
    }
  });

  return parsed;
}

// ===== RENDER =====
function renderDashboard() {
  document.getElementById('emptyState').style.display = 'none';
  const dash = document.getElementById('dashboard');
  dash.style.display = 'block';

  const { pesos, agua, workouts, periodo } = DATA;

  document.getElementById('headerSub').textContent = `Período: ${periodo || 'importado'}`;

  // ===== STATS =====
  const pesoInicio = pesos.length > 0 ? pesos[0].lbs : null;
  const pesoFin = pesos.length > 0 ? pesos[pesos.length-1].lbs : null;
  const deltaPeso = pesoInicio && pesoFin ? (pesoFin - pesoInicio).toFixed(1) : null;
  const avgAgua = agua.length > 0 ? (agua.reduce((a,b)=>a+b.litros,0)/agua.length).toFixed(1) : '—';
  const totalKm = workouts.reduce((a,w)=>a+(w.trote?parseFloat(w.trote.distancia)||0:0),0).toFixed(1);
  const diasEntrenados = workouts.filter(w=>w.entries.length>0).length;

  dash.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="label">Peso actual</div>
        <div class="value" style="color:var(--accent)">${pesoFin ? pesoFin+' lb' : '—'}</div>
        ${deltaPeso ? `<div class="delta ${parseFloat(deltaPeso)<=0?'delta-down':'delta-up'}">${parseFloat(deltaPeso)>0?'↑':'↓'} ${Math.abs(deltaPeso)} lb vs inicio</div>` : ''}
        <div class="sub">${pesoFin ? (pesoFin/2.20462).toFixed(1)+' kg' : ''}</div>
      </div>
      <div class="stat-card">
        <div class="label">Días entrenados</div>
        <div class="value" style="color:var(--accent2)">${diasEntrenados}</div>
        <div class="sub">de ${workouts.length} días registrados</div>
      </div>
      <div class="stat-card">
        <div class="label">Millas corridas</div>
        <div class="value" style="color:var(--accent3)">${totalKm}</div>
        <div class="sub">${(parseFloat(totalKm)*1.60934).toFixed(1)} km totales</div>
      </div>
      <div class="stat-card">
        <div class="label">Agua promedio</div>
        <div class="value" style="color:var(--accent4)">${avgAgua}L</div>
        <div class="sub">Meta: 2.5L diarios</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,(parseFloat(avgAgua)/2.5*100))}%; background:var(--accent4);"></div></div>
      </div>
    </div>

    <div class="section-title">📈 Evolución de peso corporal</div>
    <div class="grid-2" style="margin-bottom:24px;">
      <div class="card">
        <div class="card-title"><span class="icon">⚖️</span> Peso en libras</div>
        <canvas id="pesoChart" height="200"></canvas>
      </div>
      <div class="card">
        <div class="card-title"><span class="icon">💧</span> Hidratación diaria</div>
        <canvas id="aguaChart" height="200"></canvas>
      </div>
    </div>

    <div class="section-title">💪 Entrenamientos</div>
    <div class="grid-2" style="margin-bottom:24px;">
      <div class="card">
        <div class="card-title"><span class="icon">📅</span> Sesiones del período</div>
        <table class="table">
          <thead><tr><th>Fecha</th><th>Ejercicios</th><th>Trote</th></tr></thead>
          <tbody>${workouts.map(w=>`
            <tr>
              <td><strong>${formatFecha(w.date)}</strong></td>
              <td>${w.entries.length > 0 ? `<span class="badge badge-blue">${w.entries.length} ejerc.</span>` : '<span style="color:var(--text-muted)">—</span>'}</td>
              <td>${w.trote ? `<span class="badge badge-green">${w.trote.distancia}</span>` : '<span style="color:var(--text-muted)">—</span>'}</td>
            </tr>
          `).join('')}</tbody>
        </table>
      </div>
      <div class="card">
        <div class="card-title"><span class="icon">🏋️</span> Ejercicios registrados</div>
        <table class="table">
          <thead><tr><th>Ejercicio</th><th>Series</th><th>Mejor peso</th></tr></thead>
          <tbody>${getEjerciciosResumen().map(e=>`
            <tr>
              <td>${e.nombre}</td>
              <td><span class="badge badge-blue">${e.totalSeries}</span></td>
              <td><strong>${e.mejorPeso > 0 ? e.mejorPeso+'lb' : '—'}</strong></td>
            </tr>
          `).join('')}</tbody>
        </table>
      </div>
    </div>

    <div class="section-title">🏃 Trote del período</div>
    <div class="card" style="margin-bottom:24px;">
      <canvas id="troteChart" height="120"></canvas>
    </div>

    <div class="section-title">📋 Historial de pesos corporales</div>
    <div class="card">
      <table class="table">
        <thead><tr><th>Fecha</th><th>Libras</th><th>Kilos</th><th>Cambio</th></tr></thead>
        <tbody>${pesos.map((p,i)=>{
          const prev = i>0?pesos[i-1].lbs:null;
          const delta = prev ? (p.lbs-prev).toFixed(1) : null;
          return `<tr>
            <td>${formatFecha(p.date)}</td>
            <td><strong>${p.lbs} lb</strong></td>
            <td>${p.kg} kg</td>
            <td>${delta ? `<span class="${parseFloat(delta)<=0?'delta-down':'delta-up'}">${parseFloat(delta)>0?'+':''}${delta} lb</span>` : '—'}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>
  `;

  // Dibujar gráficos
  setTimeout(() => {
    drawLineChart('pesoChart', pesos.map(p=>({x:p.date,y:p.lbs})), 'lb', '#1e7fa3');
    drawBarChart('aguaChart', agua.map(a=>({x:a.date,y:a.litros})), 'L', '#7c5cdb', 2.5);
    drawBarChart('troteChart', workouts.filter(w=>w.trote).map(w=>({x:w.date,y:parseFloat(w.trote.distancia)||0})), 'mi', '#e07040', 0);
  }, 100);
}

function getEjerciciosResumen() {
  const map = {};
  DATA.workouts.forEach(w => {
    w.entries.forEach(e => {
      if(!map[e.nombre]) map[e.nombre] = {nombre:e.nombre, totalSeries:0, mejorPeso:0};
      map[e.nombre].totalSeries += e.series.length;
      e.series.forEach(s => {
        const match = s.match(/(\d+\.?\d*)lb/);
        if(match) map[e.nombre].mejorPeso = Math.max(map[e.nombre].mejorPeso, parseFloat(match[1]));
      });
    });
  });
  return Object.values(map).sort((a,b)=>b.totalSeries-a.totalSeries);
}

function formatFecha(dateStr) {
  if(!dateStr || !dateStr.match(/\d{4}-\d{2}-\d{2}/)) return dateStr||'';
  const d = new Date(dateStr+'T00:00:00');
  const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const dias = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  return `${dias[d.getDay()]} ${d.getDate()} ${meses[d.getMonth()]}`;
}

function drawLineChart(id, data, unit, color) {
  const canvas = document.getElementById(id);
  if(!canvas || data.length < 2) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio||1;
  const W = canvas.offsetWidth; const H = canvas.height || 200;
  canvas.width = W*dpr; canvas.height = H*dpr; ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);
  const vals = data.map(d=>d.y);
  const minV=Math.min(...vals)-0.5, maxV=Math.max(...vals)+0.5, range=maxV-minV||1;
  const pL=50,pR=16,pT=16,pB=30, cW=W-pL-pR, cH=H-pT-pB;
  // Grid
  ctx.strokeStyle='#e2e6ea'; ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y=pT+(cH/4)*i;
    ctx.beginPath(); ctx.moveTo(pL,y); ctx.lineTo(W-pR,y); ctx.stroke();
    ctx.fillStyle='#9aa5b0'; ctx.font='11px sans-serif'; ctx.textAlign='right';
    ctx.fillText((maxV-(range/4)*i).toFixed(1)+unit,pL-6,y+4);
  }
  // Gradient fill
  const grad = ctx.createLinearGradient(0,pT,0,pT+cH);
  grad.addColorStop(0, color+'33');
  grad.addColorStop(1, color+'05');
  ctx.beginPath();
  data.forEach((d,i)=>{
    const x=pL+(cW/(data.length-1))*i, y=pT+cH-((d.y-minV)/range)*cH;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.lineTo(pL+(cW/(data.length-1))*(data.length-1),pT+cH);
  ctx.lineTo(pL,pT+cH); ctx.closePath();
  ctx.fillStyle=grad; ctx.fill();
  // Line
  ctx.beginPath(); ctx.strokeStyle=color; ctx.lineWidth=2.5;
  data.forEach((d,i)=>{
    const x=pL+(cW/(data.length-1))*i, y=pT+cH-((d.y-minV)/range)*cH;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }); ctx.stroke();
  // Dots + labels
  data.forEach((d,i)=>{
    const x=pL+(cW/(data.length-1))*i, y=pT+cH-((d.y-minV)/range)*cH;
    ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2);
    ctx.fillStyle='white'; ctx.fill();
    ctx.strokeStyle=color; ctx.lineWidth=2; ctx.stroke();
  });
  // X labels (primero y último)
  ctx.fillStyle='#9aa5b0'; ctx.font='11px sans-serif';
  ctx.textAlign='left'; ctx.fillText(formatFecha(data[0].x),pL,H-6);
  ctx.textAlign='right'; ctx.fillText(formatFecha(data[data.length-1].x),W-pR,H-6);
}

function drawBarChart(id, data, unit, color, meta) {
  const canvas = document.getElementById(id);
  if(!canvas || data.length === 0) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio||1;
  const W = canvas.offsetWidth; const H = canvas.height || 160;
  canvas.width = W*dpr; canvas.height = H*dpr; ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);
  const maxV = Math.max(meta||0, ...data.map(d=>d.y)) * 1.1 || 1;
  const pL=10,pR=10,pT=16,pB=24, cW=W-pL-pR, cH=H-pT-pB;
  const barW = Math.max(8, (cW/data.length) - 6);
  if(meta > 0) {
    const metaY = pT+cH-((meta/maxV)*cH);
    ctx.strokeStyle=color+'66'; ctx.lineWidth=1; ctx.setLineDash([5,4]);
    ctx.beginPath(); ctx.moveTo(pL,metaY); ctx.lineTo(W-pR,metaY); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle=color; ctx.font='10px sans-serif'; ctx.textAlign='right';
    ctx.fillText(`Meta ${meta}${unit}`,W-pR-2,metaY-4);
  }
  data.forEach((d,i) => {
    const x = pL + (cW/data.length)*i + (cW/data.length - barW)/2;
    const barH = (d.y/maxV)*cH;
    const y = pT+cH-barH;
    const pct = meta > 0 ? d.y/meta : 1;
    const c = meta > 0 ? (pct>=1?'#2ecc8a':pct>=0.6?color:'#e05a4c') : color;
    ctx.fillStyle = c+'cc';
    ctx.beginPath();
    if(ctx.roundRect) ctx.roundRect(x,y,barW,barH,4); else ctx.rect(x,y,barW,barH);
    ctx.fill();
    if(d.y > 0) {
      ctx.fillStyle = '#5a6a7a'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(d.y % 1 === 0 ? d.y : d.y.toFixed(1), x+barW/2, y-4);
    }
  });
  ctx.fillStyle='#9aa5b0'; ctx.font='10px sans-serif';
  ctx.textAlign='left'; ctx.fillText(formatFecha(data[0].x),pL,H-4);
  ctx.textAlign='right'; ctx.fillText(formatFecha(data[data.length-1].x),W-pR,H-4);
}

window.addEventListener('resize', () => { if(DATA) renderDashboard(); });
</script>
</body>
</html>
