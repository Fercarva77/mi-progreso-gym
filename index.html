<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Mi Progreso Gym</title>
<style>
  :root {
    --bg: #0f1115; --card: #1a1d24; --card2: #21252e; --border: #2c303a;
    --text: #f0f1f3; --text-secondary: #9a9ea8; --text-muted: #6b6f78;
    --accent: #3478e0; --accent-light: #1d3a5c;
    --success: #4caf6f; --success-light: #1d3a28;
    --danger: #e05a4c; --warning: #d8a23b;
    --radius: 14px; --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--text); font-family:var(--font); -webkit-font-smoothing:antialiased; overscroll-behavior-y:none; }
  body { padding-bottom:90px; min-height:100vh; }
  .header { padding:18px 16px 12px; position:sticky; top:0; background:var(--bg); z-index:10; border-bottom:0.5px solid var(--border); }
  .header h1 { font-size:20px; font-weight:600; margin:0 0 2px; }
  .header .sub { font-size:13px; color:var(--text-secondary); }
  .container { padding:16px; max-width:480px; margin:0 auto; }
  .card { background:var(--card); border:0.5px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:14px; }
  .card-title { font-size:15px; font-weight:600; margin:0 0 12px; display:flex; align-items:center; justify-content:space-between; }
  .card-title .label { color:var(--text-secondary); font-size:12px; font-weight:400; }
  input, select { background:var(--card2); border:0.5px solid var(--border); color:var(--text); border-radius:10px; padding:11px 12px; font-size:16px; font-family:var(--font); width:100%; }
  input:focus, select:focus { outline:none; border-color:var(--accent); }
  .row { display:flex; gap:10px; margin-bottom:10px; }
  .row > * { flex:1; }
  button { border:none; border-radius:10px; padding:12px 16px; font-size:15px; font-weight:600; font-family:var(--font); cursor:pointer; }
  .btn-primary { background:var(--accent); color:white; width:100%; }
  .btn-primary:active { opacity:0.8; }
  .tabs { display:flex; gap:6px; margin-bottom:14px; background:var(--card2); border-radius:12px; padding:4px; }
  .tab { flex:1; text-align:center; padding:9px 6px; border-radius:9px; font-size:13px; font-weight:600; color:var(--text-secondary); cursor:pointer; }
  .tab.active { background:var(--accent); color:white; }
  .view { display:none; }
  .view.active { display:block; }
  .day-pill { display:inline-flex; align-items:center; gap:6px; padding:5px 12px; border-radius:20px; font-size:12px; font-weight:600; background:var(--accent-light); color:#8ab4f0; margin-bottom:10px; }
  .exercise-row { border-top:0.5px solid var(--border); padding:12px 0; }
  .exercise-row:first-child { border-top:none; padding-top:0; }
  .exercise-header { display:flex; align-items:center; justify-content:space-between; cursor:pointer; user-select:none; }
  .exercise-name { font-size:14px; font-weight:600; margin-bottom:2px; }
  .exercise-target { font-size:12px; color:var(--text-secondary); margin-bottom:8px; }
  .svg-toggle { font-size:11px; color:var(--accent); padding:3px 8px; background:var(--accent-light); border-radius:8px; white-space:nowrap; flex-shrink:0; }
  .svg-panel { display:none; background:var(--card2); border-radius:10px; padding:10px; margin-bottom:10px; text-align:center; }
  .svg-panel.open { display:block; }
  .svg-panel svg { max-width:100%; height:auto; }
  .svg-caption { font-size:11px; color:var(--text-muted); margin-top:6px; }
  .sets-grid { display:grid; grid-template-columns:28px 1fr 1fr 36px; gap:6px; align-items:center; margin-bottom:6px; }
  .sets-grid .set-num { font-size:12px; color:var(--text-muted); text-align:center; }
  .sets-grid input { padding:8px 8px; font-size:14px; text-align:center; }
  .check-btn { width:32px; height:32px; border-radius:50%; background:var(--card2); border:0.5px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:16px; color:var(--text-muted); cursor:pointer; }
  .check-btn.done { background:var(--success-light); color:var(--success); border-color:var(--success); }
  .sets-header { display:grid; grid-template-columns:28px 1fr 1fr 36px; gap:6px; margin-bottom:6px; }
  .sets-header span { font-size:11px; color:var(--text-muted); text-align:center; }
  .history-item { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-top:0.5px solid var(--border); font-size:13px; }
  .history-item:first-child { border-top:none; }
  .history-date { color:var(--text-secondary); font-size:12px; }
  .empty-state { text-align:center; padding:30px 10px; color:var(--text-muted); font-size:13px; }
  .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .stat-box { background:var(--card2); border-radius:10px; padding:12px; }
  .stat-box .stat-label { font-size:11px; color:var(--text-secondary); margin-bottom:4px; }
  .stat-box .stat-value { font-size:18px; font-weight:700; }
  .stat-box .stat-delta { font-size:11px; margin-top:2px; }
  .delta-down { color:var(--success); }
  .delta-up { color:var(--danger); }
  canvas { width:100% !important; height:180px !important; margin-top:10px; }
  .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:var(--card); border-top:0.5px solid var(--border); display:flex; padding:8px 10px 18px; z-index:20; }
  .nav-item { flex:1; text-align:center; padding:6px 0; color:var(--text-muted); font-size:11px; cursor:pointer; }
  .nav-item .nav-icon { font-size:20px; display:block; margin-bottom:2px; }
  .nav-item.active { color:var(--accent); }
  .toast { position:fixed; bottom:100px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--success); color:white; padding:10px 20px; border-radius:20px; font-size:13px; font-weight:600; opacity:0; transition:all 0.25s ease; pointer-events:none; z-index:50; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="header">
  <h1>Mi progreso</h1>
  <div class="sub" id="dateLabel"></div>
</div>
<div class="container">
  <div class="tabs">
    <div class="tab active" data-view="rutina">Rutina</div>
    <div class="tab" data-view="peso">Peso</div>
    <div class="tab" data-view="historial">Historial</div>
  </div>
  <div class="view active" id="view-rutina">
    <div class="card">
      <div class="card-title">¿Qué día entrenas hoy?</div>
      <select id="daySelect"></select>
    </div>
    <div id="routineContent"></div>
  </div>
  <div class="view" id="view-peso">
    <div class="card">
      <div class="card-title">Registrar peso de hoy</div>
      <div class="row">
        <input type="number" id="weightLbs" placeholder="Libras" inputmode="decimal" step="0.1">
        <input type="number" id="weightKg" placeholder="Kilos" inputmode="decimal" step="0.1">
      </div>
      <button class="btn-primary" id="saveWeightBtn">Guardar peso</button>
    </div>
    <div class="card">
      <div class="card-title">Resumen</div>
      <div class="stat-grid" id="weightStats"></div>
      <canvas id="weightChart"></canvas>
    </div>
  </div>
  <div class="view" id="view-historial">
    <div class="card">
      <div class="card-title">Historial de pesos corporales</div>
      <div id="weightHistory"></div>
    </div>
    <div class="card">
      <div class="card-title">Historial de entrenamientos</div>
      <div id="workoutHistory"></div>
    </div>
  </div>
</div>
<div class="bottom-nav">
  <div class="nav-item active" data-view="rutina"><span class="nav-icon">&#127947;</span>Rutina</div>
  <div class="nav-item" data-view="peso"><span class="nav-icon">&#9878;</span>Peso</div>
  <div class="nav-item" data-view="historial"><span class="nav-icon">&#128202;</span>Historial</div>
</div>
<div class="toast" id="toast">Guardado</div>

    <line x1="37" y1="118" x2="53" y2="118" stroke="#f0f1f3" stroke-width="2.5" stroke-linecap="round"/>

    <text x="60" y="135" text-anchor="middle" fill="#6b6f78" font-size="9">Pulgar arriba, agarre neutro</text>
  </svg>`
};

// ===== RUTINA =====
const RUTINA = {
  lunes: { nombre:"Lunes — Piernas (tarde) + Trote (mañana)", grupo:"Piernas", cardio:"Trote 3 millas en la mañana, ritmo 7-7.5", ejercicios:[
    {nombre:"Sentadilla con barra", target:"4 series x 8-10 reps", sets:4},
    {nombre:"Prensa de piernas", target:"3 series x 10-12 reps", sets:3},
    {nombre:"Peso muerto rumano", target:"3 series x 8-10 reps", sets:3},
    {nombre:"Extensión de cuádriceps", target:"3 series x 12 reps", sets:3},
    {nombre:"Curl femoral", target:"3 series x 12 reps", sets:3},
    {nombre:"Elevación de talones", target:"4 series x 15 reps", sets:4}
  ]},
  martes: { nombre:"Martes — Pecho y tríceps (madrugada)", grupo:"Pecho / Tríceps", cardio:null, ejercicios:[
    {nombre:"Press banca (barra o mancuernas)", target:"4 series x 8-10 reps", sets:4},
    {nombre:"Press inclinado mancuernas", target:"3 series x 10 reps", sets:3},
    {nombre:"Aperturas banca o cable", target:"3 series x 12 reps", sets:3},
    {nombre:"Fondos o press francés", target:"3 series x 10 reps", sets:3},
    {nombre:"Extensión tríceps en polea", target:"3 series x 12 reps", sets:3}
  ]},
  miercoles: { nombre:"Miércoles — Hombros y core (tarde) + Trote (mañana)", grupo:"Hombros / Core", cardio:"Trote 3 millas en la mañana, ritmo 7-7.5", ejercicios:[
    {nombre:"Press militar mancuernas", target:"4 series x 8-10 reps", sets:4},
    {nombre:"Elevaciones laterales", target:"3 series x 12-15 reps", sets:3},
    {nombre:"Elevaciones frontales", target:"2 series x 12 reps", sets:2},
    {nombre:"Pájaros (deltoide posterior)", target:"3 series x 12 reps", sets:3},
    {nombre:"Plancha", target:"3 series x 30-45 seg", sets:3},
    {nombre:"Elevación de piernas", target:"3 series x 12-15 reps", sets:3}
  ]},
  jueves: { nombre:"Jueves — Espalda y bíceps (madrugada)", grupo:"Espalda / Bíceps", cardio:null, ejercicios:[
    {nombre:"Dominadas o jalón en polea", target:"4 series x 8-10 reps", sets:4},
    {nombre:"Remo con barra o mancuerna", target:"3 series x 10 reps", sets:3},
    {nombre:"Remo en polea baja", target:"3 series x 12 reps", sets:3},
    {nombre:"Curl de bíceps con barra", target:"3 series x 10 reps", sets:3},
    {nombre:"Curl martillo", target:"3 series x 12 reps", sets:3}
  ]},
  viernes: { nombre:"Viernes — Trote (mañana)", grupo:"Cardio", cardio:"Trote 3 millas, ritmo 7-7.5", ejercicios:[] },
  sabado: { nombre:"Sábado — Trote largo (mañana)", grupo:"Cardio largo", cardio:"Trote largo 5 millas, ritmo variable 7-9", ejercicios:[] },
  domingo: { nombre:"Domingo — Descanso", grupo:"Descanso", cardio:"Descanso total o caminata ligera", ejercicios:[] }
};

const DIAS_ORDEN = ["lunes","martes","miercoles","jueves","viernes","sabado","domingo"];
const DIAS_LABEL = {lunes:"Lunes",martes:"Martes",miercoles:"Miércoles",jueves:"Jueves",viernes:"Viernes",sabado:"Sábado",domingo:"Domingo"};

// ===== STORAGE =====
const STORAGE_KEY = "gymTrackerData_v2";
function loadData() { try { const r=localStorage.getItem(STORAGE_KEY); if(r) return JSON.parse(r); } catch(e){} return {weights:[],workouts:[]}; }
function saveData(d) { localStorage.setItem(STORAGE_KEY,JSON.stringify(d)); }
let DATA = loadData();

// ===== HELPERS =====
const LB_PER_KG = 2.20462;
function todayStr() { return new Date().toISOString().split('T')[0]; }
function formatDate(s) { const d=new Date(s+'T00:00:00'); const m=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"]; return `${d.getDate()} ${m[d.getMonth()]}`; }
function todayDayKey() { const m=["domingo","lunes","martes","miercoles","jueves","viernes","sabado"]; return m[new Date().getDay()]; }
function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1600); }

// ===== NAV =====
function setView(view) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+view).classList.add('active');
  document.querySelectorAll('.tab,.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.view===view));
  if(view==='peso') renderPesoView();
  if(view==='historial') renderHistorialView();
}
document.querySelectorAll('.tab,.nav-item').forEach(el=>el.addEventListener('click',()=>setView(el.dataset.view)));

function renderHeaderDate() {
  const d=new Date();
  const dias=["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];
  const meses=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
  document.getElementById('dateLabel').textContent=`${dias[d.getDay()]}, ${d.getDate()} de ${meses[d.getMonth()]}`;
}

// ===== RUTINA =====
const daySelect = document.getElementById('daySelect');
DIAS_ORDEN.forEach(k=>{ const o=document.createElement('option'); o.value=k; o.textContent=DIAS_LABEL[k]; daySelect.appendChild(o); });

function getTodayWorkoutKey(dk) { return `${todayStr()}_${dk}`; }
function getSavedSets(dk, name) { const w=DATA.workouts.find(w=>w.key===getTodayWorkoutKey(dk)); return w?w.exercises[name]||null:null; }
function getSavedCardio(dk) { const w=DATA.workouts.find(w=>w.key===getTodayWorkoutKey(dk)); return w&&w.cardio?w.cardio:null; }

function renderRoutine() {
  const dayKey = daySelect.value;
  const day = RUTINA[dayKey];
  const container = document.getElementById('routineContent');
  let html = '';

  html += `<div class="card"><span class="day-pill">${day.grupo}</span><div class="card-title" style="margin-bottom:4px;">${day.nombre}</div>`;
  if(day.cardio) html += `<div class="exercise-target">${day.cardio}</div>`;
  html += `</div>`;

  if(day.cardio) {
    const sc = getSavedCardio(dayKey)||{};
    html += `<div class="card"><div class="card-title">Registrar trote de hoy <span class="label">opcional</span></div>
      <div class="row">
        <input type="number" inputmode="decimal" placeholder="Distancia (mi)" id="cardioDist" value="${sc.distancia||''}">
        <input type="number" inputmode="numeric" placeholder="Calorías" id="cardioCal" value="${sc.calorias||''}">
      </div>
      <div class="row">
        <input type="text" placeholder="Duración (mm:ss)" id="cardioDur" value="${sc.duracion||''}">
        <input type="number" inputmode="decimal" placeholder="Velocidad (mph)" id="cardioVel" value="${sc.velocidad||''}">
      </div></div>`;
  }

  if(day.ejercicios.length > 0) {
    html += `<div class="card">`;
    day.ejercicios.forEach((ex, exIdx) => {
      const saved = getSavedSets(dayKey, ex.nombre)||[];
      const hasSvg = !!SVGS[ex.nombre];
      html += `<div class="exercise-row">`;
      html += `<div class="exercise-header">
        <div>
          <div class="exercise-name">${ex.nombre}</div>
          <div class="exercise-target">${ex.target}</div>
        </div>
        ${hasSvg ? `<div class="svg-toggle" data-idx="${exIdx}">Ver</div>` : ''}
      </div>`;
      if(hasSvg) {
        html += `<div class="svg-panel" id="svgpanel-${exIdx}">
          ${SVGS[ex.nombre]}
        </div>`;
      }
      html += `<div class="sets-header"><span>#</span><span>Peso (lb)</span><span>Reps</span><span></span></div>`;
      for(let s=0; s<ex.sets; s++) {
        const sd = saved[s]||{peso:'',reps:'',done:false};
        html += `<div class="sets-grid">
          <div class="set-num">${s+1}</div>
          <input type="number" inputmode="decimal" placeholder="lb" value="${sd.peso}" data-ex="${exIdx}" data-set="${s}" data-field="peso" class="set-input">
          <input type="number" inputmode="numeric" placeholder="reps" value="${sd.reps}" data-ex="${exIdx}" data-set="${s}" data-field="reps" class="set-input">
          <div class="check-btn ${sd.done?'done':''}" data-ex="${exIdx}" data-set="${s}">&#10003;</div>
        </div>`;
      }
      html += `</div>`;
    });
    html += `</div>`;
  } else {
    html += `<div class="card"><div class="empty-state">Día de descanso o solo cardio.</div></div>`;
  }

  if(day.ejercicios.length > 0 || day.cardio) {
    html += `<button class="btn-primary" id="saveWorkoutBtn">Guardar entrenamiento de hoy</button>`;
  }

  container.innerHTML = html;

  container.querySelectorAll('.check-btn').forEach(btn=>btn.addEventListener('click',()=>btn.classList.toggle('done')));
  container.querySelectorAll('.svg-toggle').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const panel = document.getElementById('svgpanel-'+btn.dataset.idx);
      const open = panel.classList.toggle('open');
      btn.textContent = open ? 'Ocultar' : 'Ver';
    });
  });
}

function collectCardioData() {
  const d=document.getElementById('cardioDist');
  const c=document.getElementById('cardioCal');
  const dur=document.getElementById('cardioDur');
  const v=document.getElementById('cardioVel');
  if(!d&&!c&&!dur&&!v) return null;
  const obj={distancia:d?d.value:'',calorias:c?c.value:'',duracion:dur?dur.value:'',velocidad:v?v.value:''};
  if(!obj.distancia&&!obj.calorias&&!obj.duracion&&!obj.velocidad) return null;
  return obj;
}

function collectWorkoutData(dayKey) {
  const day=RUTINA[dayKey]; const exercises={};
  day.ejercicios.forEach((ex,exIdx)=>{
    const sets=[];
    for(let s=0;s<ex.sets;s++){
      const pi=document.querySelector(`.set-input[data-ex="${exIdx}"][data-set="${s}"][data-field="peso"]`);
      const ri=document.querySelector(`.set-input[data-ex="${exIdx}"][data-set="${s}"][data-field="reps"]`);
      const cb=document.querySelector(`.check-btn[data-ex="${exIdx}"][data-set="${s}"]`);
      sets.push({peso:pi?pi.value:'',reps:ri?ri.value:'',done:cb?cb.classList.contains('done'):false});
    }
    exercises[ex.nombre]=sets;
  });
  return exercises;
}

function saveWorkout() {
  const dk=daySelect.value; const key=getTodayWorkoutKey(dk);
  const exercises=collectWorkoutData(dk); const cardio=collectCardioData();
  let w=DATA.workouts.find(w=>w.key===key);
  if(!w){w={key,date:todayStr(),dayKey:dk,exercises:{}}; DATA.workouts.push(w);}
  w.exercises=exercises; w.cardio=cardio; w.date=todayStr();
  saveData(DATA); showToast("Entrenamiento guardado ✓");
}

daySelect.addEventListener('change',renderRoutine);
document.addEventListener('click',e=>{ if(e.target&&e.target.id==='saveWorkoutBtn') saveWorkout(); });
daySelect.value=todayDayKey();
renderRoutine();

// ===== PESO =====
const wLbs=document.getElementById('weightLbs');
const wKg=document.getElementById('weightKg');
wLbs.addEventListener('input',()=>{ if(wLbs.value) wKg.value=(parseFloat(wLbs.value)/LB_PER_KG).toFixed(1); });
wKg.addEventListener('input',()=>{ if(wKg.value) wLbs.value=(parseFloat(wKg.value)*LB_PER_KG).toFixed(1); });

document.getElementById('saveWeightBtn').addEventListener('click',()=>{
  const lbs=parseFloat(wLbs.value), kg=parseFloat(wKg.value);
  if(!lbs&&!kg){showToast("Ingresa un peso");return;}
  const fl=lbs||(kg*LB_PER_KG), fk=kg||(lbs/LB_PER_KG);
  const today=todayStr();
  const idx=DATA.weights.findIndex(w=>w.date===today);
  const entry={date:today,lbs:Math.round(fl*10)/10,kg:Math.round(fk*10)/10};
  if(idx>=0) DATA.weights[idx]=entry; else DATA.weights.push(entry);
  DATA.weights.sort((a,b)=>a.date.localeCompare(b.date));
  saveData(DATA); wLbs.value=''; wKg.value='';
  showToast("Peso guardado ✓"); renderPesoView();
});

function renderPesoView() {
  const stats=document.getElementById('weightStats');
  const weights=DATA.weights;
  if(weights.length===0){stats.innerHTML=`<div class="empty-state" style="grid-column:1/-1">Aún no hay registros de peso.</div>`;return;}
  const latest=weights[weights.length-1], first=weights[0];
  const delta=(latest.lbs-first.lbs).toFixed(1);
  const dc=delta<=0?'delta-down':'delta-up', ds=delta>0?'+':'';
  let weekDelta=null;
  const ld=new Date(latest.date);
  for(let i=weights.length-1;i>=0;i--){
    const diff=(ld-new Date(weights[i].date))/(1000*60*60*24);
    if(diff>=6){weekDelta=(latest.lbs-weights[i].lbs).toFixed(1);break;}
  }
  stats.innerHTML=`
    <div class="stat-box"><div class="stat-label">Peso actual</div><div class="stat-value">${latest.lbs} lb</div><div class="stat-delta" style="color:var(--text-muted)">${latest.kg} kg</div></div>
    <div class="stat-box"><div class="stat-label">Cambio total</div><div class="stat-value ${dc}">${ds}${delta} lb</div><div class="stat-delta" style="color:var(--text-muted)">desde ${formatDate(first.date)}</div></div>
    ${weekDelta!==null?`<div class="stat-box" style="grid-column:1/-1"><div class="stat-label">Última semana</div><div class="stat-value ${weekDelta<=0?'delta-down':'delta-up'}">${weekDelta>0?'+':''}${weekDelta} lb</div></div>`:''}
  `;
  drawChart(weights);
}

function drawChart(weights) {
  const canvas=document.getElementById('weightChart');
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.getBoundingClientRect();
  canvas.width=rect.width*dpr; canvas.height=180*dpr; ctx.scale(dpr,dpr);
  const W=rect.width, H=180;
  ctx.clearRect(0,0,W,H);
  if(weights.length<2){ctx.fillStyle='#6b6f78';ctx.font='13px sans-serif';ctx.textAlign='center';ctx.fillText('Agrega al menos 2 registros para ver el gráfico',W/2,H/2);return;}
  const recent=weights.slice(-30);
  const vals=recent.map(w=>w.lbs);
  const minV=Math.min(...vals)-1, maxV=Math.max(...vals)+1, range=maxV-minV||1;
  const pL=36,pR=10,pT=14,pB=22, cW=W-pL-pR, cH=H-pT-pB;
  ctx.strokeStyle='#2c303a'; ctx.lineWidth=1;
  for(let i=0;i<=3;i++){
    const y=pT+(cH/3)*i;
    ctx.beginPath(); ctx.moveTo(pL,y); ctx.lineTo(W-pR,y); ctx.stroke();
    ctx.fillStyle='#6b6f78'; ctx.font='10px sans-serif'; ctx.textAlign='right';
    ctx.fillText((maxV-(range/3)*i).toFixed(0),pL-6,y+3);
  }
  ctx.beginPath(); ctx.strokeStyle='#3478e0'; ctx.lineWidth=2;
  recent.forEach((w,i)=>{
    const x=pL+(cW/(recent.length-1))*i, y=pT+cH-((w.lbs-minV)/range)*cH;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }); ctx.stroke();
  recent.forEach((w,i)=>{
    const x=pL+(cW/(recent.length-1))*i, y=pT+cH-((w.lbs-minV)/range)*cH;
    ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2); ctx.fillStyle='#3478e0'; ctx.fill();
  });
  ctx.fillStyle='#6b6f78'; ctx.font='10px sans-serif';
  ctx.textAlign='left'; ctx.fillText(formatDate(recent[0].date),pL,H-4);
  ctx.textAlign='right'; ctx.fillText(formatDate(recent[recent.length-1].date),W-pR,H-4);
}
window.addEventListener('resize',()=>{ if(document.getElementById('view-peso').classList.contains('active')) renderPesoView(); });

// ===== HISTORIAL =====
function renderHistorialView() {
  const wh=document.getElementById('weightHistory');
  const wkh=document.getElementById('workoutHistory');
  const sw=[...DATA.weights].sort((a,b)=>b.date.localeCompare(a.date));
  wh.innerHTML=sw.length===0?`<div class="empty-state">Sin registros aún.</div>`:sw.slice(0,20).map(w=>`<div class="history-item"><span class="history-date">${formatDate(w.date)}</span><span>${w.lbs} lb &nbsp;/&nbsp; ${w.kg} kg</span></div>`).join('');
  const swk=[...DATA.workouts].sort((a,b)=>b.date.localeCompare(a.date));
  if(swk.length===0){wkh.innerHTML=`<div class="empty-state">Sin entrenamientos registrados aún.</div>`;return;}
  wkh.innerHTML=swk.slice(0,15).map(w=>{
    const ex=Object.keys(w.exercises||{}).length;
    const dl=DIAS_LABEL[w.dayKey]||w.dayKey;
    let det=ex>0?`${ex} ejercicios`:'';
    if(w.cardio){const c=w.cardio,p=[];if(c.distancia)p.push(`${c.distancia}mi`);if(c.duracion)p.push(c.duracion);if(c.calorias)p.push(`${c.calorias}cal`);if(p.length)det+=(det?' · ':'')+'Trote: '+p.join(', ');}
    return `<div class="history-item"><span class="history-date">${formatDate(w.date)}</span><span>${dl} · ${det||'Sin datos'}</span></div>`;
  }).join('');
}

renderHeaderDate();
